# ~/.tmux.conf — sensible defaults + TPM plugins.
# Reload after editing: prefix + r  (or: tmux source-file ~/.tmux.conf)

# --- Terminal & general ------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# 1-indexed windows/panes; renumber on close
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on

# --- Prefix: C-a (Ctrl-B is awkward; C-a frees up Ctrl-B for vim/other apps)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config -----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# --- Pane splits inherit cwd; use intuitive | and - ------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Vim-style pane navigation (vim-tmux-navigator overrides for nvim) ------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Plugins (TPM) -----------------------------------------------------------
# Install/update with prefix + I (capital i). Update with prefix + U.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # broadly-agreed defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-yank'          # system clipboard
set -g @plugin 'christoomey/vim-tmux-navigator'  # seamless C-h/j/k/l between nvim panes & tmux

# Initialize TPM (must be the very last line of the config)
run '~/.tmux/plugins/tpm/tpm'
